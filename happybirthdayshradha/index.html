<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>For Shradha — Pull the Ribbon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400;1,500&family=Instrument+Serif:ital@0;1&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f5ede2;
  --cream-2: #ede3d4;
  --paper: #faf5ec;
  --ink: #3a1820;
  --ink-2: #5c2a2e;
  --rose: oklch(0.62 0.13 18);
  --rose-deep: oklch(0.48 0.14 15);
  --rose-light: oklch(0.78 0.09 18);
  --gold: oklch(0.78 0.09 78);
  --gold-deep: oklch(0.62 0.1 75);
  --shadow-box: 0 60px 90px -40px rgba(58,24,32,0.45), 0 30px 50px -25px rgba(58,24,32,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background:
    radial-gradient(ellipse at 50% 30%, #f8f1e6 0%, #ede0c9 60%, #d8c39e 100%);
  min-height: 100vh;
  font-family: 'Instrument Serif', serif;
  color: var(--ink);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.23  0 0 0 0 0.09  0 0 0 0 0.12  0 0 0 0.07 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity: 0.55;
  pointer-events: none;
  mix-blend-mode: multiply;
  z-index: 1;
}

/* Decorative border frame */
.frame {
  position: fixed;
  inset: 24px;
  border: 1px solid rgba(58,24,32,0.25);
  pointer-events: none;
  z-index: 2;
}
.frame::before, .frame::after {
  content: '';
  position: absolute;
  width: 28px; height: 28px;
  border: 1px solid rgba(58,24,32,0.4);
}
.frame::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }
.frame::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }
.frame-corners { position: absolute; inset: 0; }
.frame-corners span {
  position: absolute;
  width: 28px; height: 28px;
  border: 1px solid rgba(58,24,32,0.4);
}
.frame-corners span:nth-child(1) { top: -4px; right: -4px; border-left: none; border-bottom: none; }
.frame-corners span:nth-child(2) { bottom: -4px; left: -4px; border-right: none; border-top: none; }

/* Top + bottom monograms */
.monogram {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--ink-2);
  z-index: 3;
  display: flex; align-items: center; gap: 14px;
}
.monogram::before, .monogram::after {
  content: ''; width: 60px; height: 1px; background: var(--ink-2); opacity: 0.5;
}
.monogram.top { top: 48px; }
.monogram.bot { bottom: 48px; }

main {
  position: relative;
  z-index: 4;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 24px;
  gap: 36px;
}

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: var(--ink-2);
  display: flex; align-items: center; gap: 14px;
  opacity: 0;
  animation: rise 1.2s 0.2s ease-out forwards;
}
.eyebrow::before, .eyebrow::after {
  content: ''; width: 40px; height: 1px; background: var(--ink-2); opacity: 0.5;
}

.title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(40px, 6.5vw, 88px);
  text-align: center;
  line-height: 1;
  letter-spacing: -0.01em;
  opacity: 0;
  animation: rise 1.2s 0.5s ease-out forwards;
}
.title em {
  font-style: italic;
  color: var(--rose-deep);
  font-weight: 400;
  display: block;
  font-size: 1.2em;
  margin-top: 6px;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(16px, 1.6vw, 20px);
  color: var(--ink-2);
  max-width: 460px;
  text-align: center;
  line-height: 1.5;
  opacity: 0;
  animation: rise 1.2s 0.8s ease-out forwards;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ Gift Box ============ */
.gift-stage {
  position: relative;
  width: min(420px, 78vw);
  height: min(420px, 78vw);
  perspective: 1200px;
  cursor: pointer;
  opacity: 0;
  animation: rise 1.4s 1.1s ease-out forwards;
}

.gift {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
}

.gift-stage:hover .gift:not(.opening) {
  transform: translateY(-6px);
}
.gift-stage:hover .lid:not(.gift.opening *) {
  transform: translateY(-4px);
}

/* The box body */
.box-body {
  position: absolute;
  left: 12%; right: 12%;
  top: 32%; bottom: 8%;
  background:
    linear-gradient(180deg, oklch(0.52 0.12 15) 0%, oklch(0.4 0.1 12) 100%);
  border-radius: 4px;
  box-shadow:
    inset 0 -10px 30px rgba(0,0,0,0.4),
    inset 0 4px 0 rgba(255,255,255,0.06),
    var(--shadow-box);
}
.box-body::before {
  /* damask pattern */
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse 8px 12px at 25% 25%, oklch(0.78 0.09 78 / 0.15), transparent 70%),
    radial-gradient(ellipse 8px 12px at 75% 25%, oklch(0.78 0.09 78 / 0.15), transparent 70%),
    radial-gradient(ellipse 8px 12px at 25% 75%, oklch(0.78 0.09 78 / 0.15), transparent 70%),
    radial-gradient(ellipse 8px 12px at 75% 75%, oklch(0.78 0.09 78 / 0.15), transparent 70%);
  background-size: 60px 60px;
  border-radius: inherit;
}
.box-body::after {
  /* vertical ribbon down the front of box */
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 14%;
  margin-left: -7%;
  background:
    linear-gradient(180deg, oklch(0.78 0.1 78) 0%, oklch(0.62 0.11 75) 50%, oklch(0.78 0.1 78) 100%);
  box-shadow:
    inset 2px 0 4px rgba(0,0,0,0.2),
    inset -2px 0 4px rgba(0,0,0,0.2),
    inset 0 0 8px rgba(255,255,255,0.2);
}

/* The lid */
.lid {
  position: absolute;
  left: 6%; right: 6%;
  top: 22%;
  height: 18%;
  background:
    linear-gradient(180deg, oklch(0.55 0.13 15) 0%, oklch(0.42 0.11 12) 100%);
  border-radius: 4px;
  box-shadow:
    inset 0 -6px 20px rgba(0,0,0,0.4),
    inset 0 3px 0 rgba(255,255,255,0.08),
    0 8px 14px -4px rgba(0,0,0,0.4);
  transform-origin: center bottom;
  transition: transform 1s cubic-bezier(0.5, 0, 0.3, 1);
  z-index: 4;
}
.lid::before {
  content: '';
  position: absolute;
  left: 50%; top: -4px; bottom: -4px;
  width: 14%;
  margin-left: -7%;
  background:
    linear-gradient(180deg, oklch(0.78 0.1 78) 0%, oklch(0.62 0.11 75) 50%, oklch(0.78 0.1 78) 100%);
  box-shadow: inset 2px 0 4px rgba(0,0,0,0.2), inset -2px 0 4px rgba(0,0,0,0.2);
}
.lid::after {
  /* monogram tag */
  content: '';
  position: absolute;
  left: 6%; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  background: oklch(0.78 0.1 78);
  box-shadow: 0 0 0 2px oklch(0.42 0.11 12), inset -1px -1px 2px rgba(0,0,0,0.3);
}

/* The bow on top */
.bow {
  position: absolute;
  left: 50%;
  top: 8%;
  width: 50%;
  height: 22%;
  transform: translateX(-50%);
  z-index: 5;
  transition: transform 0.8s cubic-bezier(0.5, 0, 0.3, 1), opacity 0.6s 0.6s ease;
}
.bow-loop {
  position: absolute;
  top: 10%;
  width: 44%;
  height: 80%;
  background:
    radial-gradient(ellipse at 30% 30%, oklch(0.85 0.1 25) 0%, oklch(0.62 0.13 18) 60%, oklch(0.42 0.13 12) 100%);
  border-radius: 50% 60% 30% 50%;
  box-shadow: inset -4px -4px 8px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.25);
}
.bow-loop.left {
  left: 0;
  transform: rotate(-22deg);
  border-radius: 60% 50% 50% 30%;
}
.bow-loop.right {
  right: 0;
  transform: rotate(22deg);
  border-radius: 50% 60% 30% 50%;
}
.bow-knot {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 22%;
  height: 70%;
  background: radial-gradient(ellipse at 40% 40%, oklch(0.7 0.13 18), oklch(0.42 0.13 12));
  border-radius: 30%;
  z-index: 2;
  box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
}
.bow-tail {
  position: absolute;
  width: 16%;
  height: 60%;
  background: linear-gradient(180deg, oklch(0.62 0.13 18), oklch(0.42 0.13 12));
  top: 60%;
  border-radius: 4px 4px 50% 50%;
  box-shadow: inset -2px 0 4px rgba(0,0,0,0.25);
  transform-origin: top center;
  transition: transform 0.8s cubic-bezier(0.5, 0, 0.3, 1);
}
.bow-tail.left { left: 28%; transform: rotate(-8deg); }
.bow-tail.right { right: 28%; transform: rotate(8deg); }

/* "Pull" hint */
.pull-hint {
  position: absolute;
  left: 50%;
  top: -36px;
  transform: translateX(-50%);
  font-family: 'Caveat', cursive;
  font-size: 26px;
  color: var(--rose-deep);
  white-space: nowrap;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  pointer-events: none;
  transition: opacity 0.4s;
}
.pull-hint .arrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  animation: bob 1.6s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}

/* Tag dangling */
.tag {
  position: absolute;
  right: -8%;
  top: 56%;
  width: 80px;
  background: var(--paper);
  padding: 12px 10px;
  text-align: center;
  border-radius: 2px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
  transform: rotate(8deg);
  z-index: 6;
  font-family: 'Cormorant Garamond', serif;
  border: 1px solid rgba(58,24,32,0.15);
}
.tag::before {
  content: '';
  position: absolute;
  top: -1px; left: 50%; transform: translateX(-50%);
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--cream-2);
  box-shadow: inset 0 0 0 2px rgba(58,24,32,0.2);
}
.tag::after {
  content: '';
  position: absolute;
  bottom: 100%; left: 50%; transform: translateX(-50%);
  width: 1px; height: 30px;
  background: rgba(58,24,32,0.4);
  z-index: -1;
}
.tag .for {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin-top: 2px;
}
.tag .name {
  font-family: 'Caveat', cursive;
  font-size: 24px;
  color: var(--rose-deep);
  line-height: 1;
  margin-top: 2px;
}

/* Sparkles */
.sparkle {
  position: absolute;
  font-family: 'Cormorant Garamond', serif;
  color: var(--gold-deep);
  font-style: italic;
  pointer-events: none;
  opacity: 0;
  animation: twinkle 3s ease-in-out infinite;
}
.sparkle.s1 { top: 18%; left: -2%; font-size: 22px; animation-delay: 0s; }
.sparkle.s2 { top: 40%; right: -4%; font-size: 16px; animation-delay: 0.7s; }
.sparkle.s3 { bottom: 6%; left: 8%; font-size: 14px; animation-delay: 1.4s; }
.sparkle.s4 { top: 4%; right: 18%; font-size: 18px; animation-delay: 2.1s; }
@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.85; transform: scale(1); }
}

/* ============ Opening animation ============ */
.gift.opening .bow {
  transform: translateX(-50%) translateY(-200px) rotate(-30deg) scale(0.6);
  opacity: 0;
}
.gift.opening .bow-tail.left { transform: rotate(-60deg) translateY(-20px); }
.gift.opening .bow-tail.right { transform: rotate(60deg) translateY(-20px); }
.gift.opening .lid {
  transform: translateY(-180px) rotate(-12deg);
}
.gift.opening .pull-hint { opacity: 0; }
.gift.opening .tag { opacity: 0; transform: rotate(8deg) translateY(40px); transition: all 0.6s; }

/* Light burst from inside */
.glow {
  position: absolute;
  left: 30%; right: 30%;
  top: 30%;
  height: 30%;
  background: radial-gradient(ellipse, oklch(0.95 0.06 80 / 0.9), transparent 70%);
  opacity: 0;
  z-index: 3;
  pointer-events: none;
  transition: opacity 0.8s 0.4s;
}
.gift.opening .glow { opacity: 1; }

/* ============ Page exit ============ */
body.exiting {
  transition: opacity 0.8s, transform 0.8s;
  opacity: 0;
  transform: scale(1.05);
}

/* ============ Confetti ============ */
.confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
.confetto {
  position: absolute;
  width: 8px; height: 12px;
  top: -20px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(120vh) rotate(720deg); }
}

/* ============ Floating petals ambient ============ */
.petals { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
.petal {
  position: absolute;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: oklch(0.62 0.13 18 / 0.18);
  font-size: 30px;
  animation: drift linear infinite;
}
@keyframes drift {
  from { transform: translateY(-50px) translateX(0) rotate(0deg); }
  to { transform: translateY(110vh) translateX(80px) rotate(360deg); }
}

@media (max-width: 600px) {
  .monogram.top { top: 36px; }
  .monogram.bot { bottom: 36px; }
  main { padding: 80px 20px; gap: 28px; }
  .pull-hint { font-size: 22px; top: -30px; }
  .tag { width: 64px; font-size: 12px; right: -4%; }
  .frame { inset: 14px; }
}
</style>
</head>
<body>

<div class="frame"><div class="frame-corners"><span></span><span></span></div></div>
<div class="monogram top">A &nbsp;·&nbsp; S</div>
<div class="monogram bot">May 12 · MMXXVI</div>

<div class="petals" id="petals"></div>

<main>
  <div class="eyebrow">A small thing for you</div>
  <h1 class="title">
    Happy Birthday,
    <em>Shradha</em>
  </h1>
  <p class="subtitle">There's something inside. Pull the ribbon to open it.</p>

  <div class="gift-stage" id="stage" role="button" aria-label="Open gift" tabindex="0">
    <div class="gift" id="gift">
      <div class="pull-hint" id="hint">
        <span>pull the ribbon</span>
        <span class="arrow">↓</span>
      </div>

      <span class="sparkle s1">✦</span>
      <span class="sparkle s2">✧</span>
      <span class="sparkle s3">✦</span>
      <span class="sparkle s4">✧</span>

      <div class="bow">
        <div class="bow-tail left"></div>
        <div class="bow-tail right"></div>
        <div class="bow-loop left"></div>
        <div class="bow-loop right"></div>
        <div class="bow-knot"></div>
      </div>

      <div class="lid"></div>
      <div class="glow"></div>
      <div class="box-body"></div>

      <div class="tag">
        <div class="for">To</div>
        <div class="name">Shradha</div>
        <div class="for" style="margin-top: 4px;">From</div>
        <div class="name" style="font-size: 20px;">Anant</div>
      </div>
    </div>
  </div>

  <div class="subtitle" style="font-size: 13px; opacity: 0.55; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.25em; text-transform: uppercase; font-style: normal; animation-delay: 1.5s;">
    tap to open
  </div>
</main>

<div class="confetti-layer" id="confetti"></div>

<script>
// Ambient floating petals
(function petals() {
  const layer = document.getElementById('petals');
  const glyphs = ['❀', '✦', '✧', '·'];
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('span');
    p.className = 'petal';
    p.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.fontSize = (16 + Math.random() * 24) + 'px';
    const dur = 18 + Math.random() * 22;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = -(Math.random() * dur) + 's';
    p.style.opacity = 0.2 + Math.random() * 0.3;
    layer.appendChild(p);
  }
})();

const stage = document.getElementById('stage');
const gift = document.getElementById('gift');
const hint = document.getElementById('hint');
let opened = false;

function fireConfetti() {
  const layer = document.getElementById('confetti');
  const colors = ['#c87a7a', '#d4a574', '#9b3a3a', '#3a1820', '#e8c097', '#a85a5a'];
  for (let i = 0; i < 100; i++) {
    const c = document.createElement('div');
    c.className = 'confetto';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 1 + 's';
    c.style.animationDuration = (3 + Math.random() * 3) + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.7) c.style.borderRadius = '50%';
    layer.appendChild(c);
    setTimeout(() => c.remove(), 7000);
  }
}

function openGift() {
  if (opened) return;
  opened = true;
  gift.classList.add('opening');
  hint.style.opacity = '0';
  setTimeout(fireConfetti, 600);
  setTimeout(() => {
    document.body.classList.add('exiting');
    setTimeout(() => {
      window.location.href = 'birthday.html';
    }, 700);
  }, 1800);
}

stage.addEventListener('click', openGift);
stage.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openGift(); }
});
</script>
</body>
</html>
